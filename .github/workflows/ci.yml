name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  web-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Run Web Tests
        run: npm test

  windows-desktop:
    runs-on: windows-latest
    needs: web-tests
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Run Windows CI Validation
        shell: pwsh
        run: npm run ci:local

      - name: Upload Portable Artifact
        uses: actions/upload-artifact@v4
        with:
          name: doctor-windows-portable
          path: release/DoctorRegister-1.0.0-portable.exe

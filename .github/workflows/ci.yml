name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  web-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Run Web Tests
        run: npm test

  windows-desktop:
    runs-on: windows-latest
    needs: web-tests
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Read Build Metadata
        id: meta
        shell: pwsh
        run: node scripts/release-meta.mjs --github-output

      - name: Run Windows CI Validation
        shell: pwsh
        run: npm run ci:local

      - name: Upload Portable Artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ steps.meta.outputs.portable_artifact_name }}
          path: ${{ steps.meta.outputs.portable_path }}
          if-no-files-found: error
